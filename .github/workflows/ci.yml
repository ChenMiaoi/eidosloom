name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: node dist/cli.js doctor
      - run: node dist/cli.js review-levels
      - run: node dist/cli.js review-packet --workspace "${{ runner.temp }}/eidosloom-cli" --project smoke --target custom --level deep --review-mode committee --ui-mode prefer-pro --caller humanizer --rubric "Preserve facts." --force
      - run: python skills/eidosloom/scripts/scaffold_eidosloom.py --workspace "${{ runner.temp }}/eidosloom-skill" --project smoke --round 0 --phase review --force
      - run: python skills/eidosloom-review/scripts/build_review_packet.py --workspace "${{ runner.temp }}/eidosloom-review" --project smoke --target custom --level deep --review-mode adversarial --ui-mode prefer-pro --force
      - run: npm pack --dry-run

      - name: Check shell installer syntax
        if: runner.os != 'Windows'
        run: bash -n installers/install.sh

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content installers/install.ps1 -Raw))
          "PowerShell syntax ok"
