name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: node dist/cli.js doctor
      - run: node dist/cli.js review-levels
      - run: node dist/cli.js review-packet --workspace "${{ runner.temp }}/eidosloom-cli" --project smoke --target custom --level deep --review-mode committee --ui-mode require-pro --observed-ui-label Pro --ui-selection-status selected --ui-selection-verified true --caller humanizer --rubric "Preserve facts." --force
      - run: python skills/eidosloom/scripts/scaffold_eidosloom.py --workspace "${{ runner.temp }}/eidosloom-plan" --project smoke --round 0 --phase plan --scope plan --no-zip
      - run: python skills/eidosloom/scripts/scaffold_eidosloom.py --workspace "${{ runner.temp }}/eidosloom-skill" --project smoke --round 0 --phase review --force
      - run: python skills/eidosloom-review/scripts/build_review_packet.py --workspace "${{ runner.temp }}/eidosloom-review" --project smoke --target custom --level deep --review-mode adversarial --ui-mode require-pro --observed-ui-label Pro --ui-selection-status selected --ui-selection-verified true --caller humanizer --force
      - run: python skills/eidosloom-review/scripts/validate_review_contract.py request skills/eidosloom-review/references/fixtures/humanizer-request.json
      - run: python skills/eidosloom-review/scripts/validate_review_contract.py result skills/eidosloom-review/references/fixtures/humanizer-result.json
      - run: npm pack --dry-run

      - name: Check shell installer syntax
        if: runner.os != 'Windows'
        run: bash -n installers/install.sh

      - name: Shell installer smoke
        if: runner.os != 'Windows'
        env:
          CODEX_HOME: ${{ runner.temp }}/codex home
          EIDOSLOOM_REF: ${{ github.sha }}
        run: |
          ./installers/install.sh
          node - <<'NODE'
          const { existsSync, readFileSync } = require("node:fs");
          const { join } = require("node:path");
          const manifest = JSON.parse(readFileSync("skills/eidosloom/references/bundle-manifest.json", "utf8"));
          const codexHome = process.env.CODEX_HOME;
          const expected = manifest.skills.map((skill) => skill.name).sort();
          const missing = expected.filter((name) => !existsSync(join(codexHome, "skills", name, "SKILL.md")));
          if (missing.length) {
            throw new Error(`Missing installed skills: ${missing.join(", ")}`);
          }
          NODE
          node dist/cli.js doctor
          node dist/cli.js paths

      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content installers/install.ps1 -Raw))
          "PowerShell syntax ok"

      - name: PowerShell installer smoke
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_HOME: ${{ runner.temp }}\codex home
          EIDOSLOOM_REF: ${{ github.sha }}
        run: |
          .\installers\install.ps1
          $Manifest = Get-Content "skills/eidosloom/references/bundle-manifest.json" -Raw | ConvertFrom-Json
          $Expected = @($Manifest.skills | ForEach-Object { $_.name } | Sort-Object)
          $Missing = @()
          foreach ($Name in $Expected) {
            $SkillPath = Join-Path (Join-Path $env:CODEX_HOME "skills") (Join-Path $Name "SKILL.md")
            if (-not (Test-Path $SkillPath)) {
              $Missing += $Name
            }
          }
          if ($Missing.Count -gt 0) {
            throw "Missing installed skills: $($Missing -join ', ')"
          }
          node dist/cli.js doctor
          node dist/cli.js paths
